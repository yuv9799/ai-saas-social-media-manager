version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: socialpulse-db
    restart: always
    environment:
      POSTGRES_DB: socialpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Cache & Queue Service
  redis:
    image: redis:7-alpine
    container_name: socialpulse-cache
    restart: always
    ports:
      - "6379:6379"

  # Express API Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: socialpulse-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/socialpulse?schema=public
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy_gemini_key}
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis

  # Next.js Frontend App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialpulse-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend

volumes:
  pgdata:
